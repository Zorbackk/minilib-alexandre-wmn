# frontend/docker-compose.prod.yml
# Fichier séparé pour la production - optimisé, sans ports exposés inutiles

services:

  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/ # Changement de l'entrypoint pour accepter pgsl 18 - Facilite migration
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/constraints.sql:/docker-entrypoint-initdb.d/02-constraints.sql
      - ./database/exports.sql:/docker-entrypoint-initdb.d/03-exports.sql
    # Pas de ports exposés : la BDD n'est pas accessible de l'extérieur

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5000:5000"
    depends_on: [db]

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "81:80"
    depends_on: [backend]

volumes: 
  postgres_data:
      